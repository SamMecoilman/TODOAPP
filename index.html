<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TODO Manager</title>
<style>
:root {
  --primary: #4A90D9;
  --primary-dark: #357ABD;
  --bg: #F0F4F8;
  --surface: #FFFFFF;
  --border: #DEE2E6;
  --text: #212529;
  --muted: #6C757D;
  --row-pending: #FFFFFF;
  --row-hold: #FFFBEB;
  --row-hold-accent: #F59E0B;
  --row-wip: #EFF8FF;
  --row-wip-accent: #3B82F6;
  --row-done: #F8F9FA;
  --row-done-text: #9CA3AF;
  --pri-high: #EF4444;
  --pri-mid: #F97316;
  --pri-low: #22C55E;
  --due-overdue-bg: #FEE2E2;
  --due-overdue-text: #DC2626;
  --due-today-bg: #FECACA;
  --due-today-text: #991B1B;
  --due-soon-bg: #FEF3C7;
  --due-soon-text: #92400E;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', 'Hiragino Sans', 'Yu Gothic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

/* ── HEADER ── */
.sticky-top { position: sticky; top: 0; z-index: 200; background: var(--bg); box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.app-header { background: linear-gradient(135deg, #4A90D9, #357ABD); color: #fff; padding: 10px 18px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 6px rgba(0,0,0,.2); }
.add-bar-wrap { padding: 10px 18px 10px; background: var(--bg); }
.app-title { font-size: 18px; font-weight: 800; letter-spacing: .5px; flex: 1; }
.view-toggle { display: flex; gap: 3px; background: rgba(255,255,255,.15); padding: 3px; border-radius: 6px; }
.view-btn { padding: 5px 14px; border: none; background: transparent; color: rgba(255,255,255,.85); border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .2s; }
.view-btn.active { background: #fff; color: var(--primary); }
.hdr-btn { padding: 5px 11px; background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.3); border-radius: 4px; cursor: pointer; font-size: 12px; }
.hdr-btn:hover { background: rgba(255,255,255,.28); }

/* ── QUICK FILTERS ── */
.quick-row { padding: 7px 18px; display: flex; gap: 7px; align-items: center; background: #fff; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.quick-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; white-space: nowrap; }
.qf-btn { padding: 3px 11px; border: 1px solid var(--border); background: #fff; border-radius: 12px; cursor: pointer; font-size: 12px; transition: all .2s; white-space: nowrap; }
.qf-btn:hover, .qf-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* ── FILTER BAR ── */
.filter-bar { padding: 8px 18px; display: flex; gap: 8px; align-items: flex-end; background: #F1F5F9; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.fg { display: flex; flex-direction: column; gap: 2px; }
.fg label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
.fg select, .fg input { padding: 5px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; background: #fff; min-width: 100px; }
.fg input[type="text"] { min-width: 150px; }
.reset-btn { padding: 5px 14px; background: #EF4444; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 700; align-self: flex-end; }

/* ── STATS ── */
.stats-bar { padding: 6px 18px; display: flex; gap: 16px; background: #fff; border-bottom: 1px solid var(--border); font-size: 12px; flex-wrap: wrap; }
.stat { color: var(--muted); }
.stat strong { color: var(--text); font-weight: 700; }
.stat.warn { color: #EF4444; }

/* ── MAIN ── */
.main { padding: 14px 18px; }
.add-bar { display: flex; gap: 8px; margin-bottom: 12px; }
.add-input { flex: 1; padding: 8px 12px; border: 2px solid var(--border); border-radius: 6px; font-size: 13px; transition: border-color .2s; }
.add-input:focus { outline: none; border-color: var(--primary); }
.add-btn { padding: 8px 18px; background: var(--primary); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 700; white-space: nowrap; }
.add-btn:hover { background: var(--primary-dark); }

/* ── TABLE ── */
.tbl-wrap { overflow-x: auto; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
table { width: 100%; border-collapse: collapse; background: #fff; }
thead th { background: #F1F5F9; padding: 9px 10px; text-align: left; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; border-bottom: 2px solid var(--border); white-space: nowrap; }
thead th.sort { cursor: pointer; user-select: none; }
thead th.sort:hover { color: var(--primary); }
tbody td { padding: 7px 10px; border-bottom: 1px solid #F0F4F8; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }

/* ── ROW COLORS（優先順: 完了 > 期日urgency > ステータス）──
   完了       → グレー
   期日超過   → 赤
   今日期日   → 濃い赤オレンジ
   3日以内    → 黄色
   保留       → 薄い黄色（警戒）
   進行中     → 薄い青
   未着手     → 白
*/
tr.row-done    { background: var(--row-done); }
tr.row-done td { color: var(--row-done-text) !important; }
tr.row-overdue { background: #FEE2E2; }
tr.row-today   { background: #FECACA; }
tr.row-soon    { background: #FEFCE8; }
tr.row-hold    { background: var(--row-hold); }
tr.row-wip     { background: var(--row-wip); }
tr.row-normal  { background: #FFFFFF; }
/* 左端アクセントライン */
tr.row-overdue td:first-child { border-left: 3px solid #EF4444; }
tr.row-today   td:first-child { border-left: 3px solid #DC2626; }
tr.row-soon    td:first-child { border-left: 3px solid #F59E0B; }
tr.row-hold    td:first-child { border-left: 3px solid var(--row-hold-accent); }
tr.row-wip     td:first-child { border-left: 3px solid var(--row-wip-accent); }

/* ── DATE GROUP HEADERS ── */
tr.grp-hdr td { padding: 9px 14px 7px; font-size: 12px; font-weight: 800; letter-spacing: .3px; background: #F1F5F9; border-top: 2px solid #E2E8F0; border-bottom: 1px solid #E2E8F0; cursor: pointer; user-select: none; }
tr.grp-hdr:first-child td { border-top: none; }
tr.grp-hdr.grp-overdue td { background: #FEE2E2; color: #DC2626; }
tr.grp-hdr.grp-today   td { background: #FECACA; color: #991B1B; }
tr.grp-hdr.grp-soon    td { background: #FEFCE8; color: #78350F; }
tr.grp-hdr td:hover { filter: brightness(.96); }
.grp-count { font-size: 11px; font-weight: 600; background: rgba(0,0,0,.07); padding: 1px 8px; border-radius: 8px; color: inherit; opacity:.8; margin-left: 8px; }
.grp-arrow { margin-right: 6px; display: inline-block; transition: transform .2s; font-style: normal; }
.grp-collapsed .grp-arrow { transform: rotate(-90deg); }
tr.grp-row-hidden { display: none; }

/* ── INLINE EDIT ── */
.ec { cursor: pointer; border-radius: 3px; }
.ec:hover { background: rgba(74,144,217,.08); }
.ec input, .ec select { padding: 3px 6px; border: 2px solid var(--primary); border-radius: 3px; font-size: 12px; font-family: inherit; outline: none; width: 100%; background: #fff; }

/* ── PRIORITY BADGE ── */
.pri { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 11px; font-weight: 700; color: #fff; }
.pri-高 { background: var(--pri-high); }
.pri-中 { background: var(--pri-mid); }
.pri-低 { background: var(--pri-low); }

/* ── PROGRESS ── */
.prog-wrap { display: flex; align-items: center; gap: 5px; }
.prog-bg { background: #E5E7EB; border-radius: 4px; height: 6px; width: 70px; overflow: hidden; flex-shrink: 0; }
.prog-fill { height: 100%; border-radius: 4px; transition: width .3s; }
.prog-sel { font-size: 11px; border: none; background: transparent; color: var(--muted); cursor: pointer; max-width: 52px; }

/* ── DUE DATE ── */
.due-chip { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 12px; }
.due-overdue { background: var(--due-overdue-bg); color: var(--due-overdue-text); font-weight: 700; }
.due-today   { background: var(--due-today-bg);   color: var(--due-today-text);   font-weight: 700; }
.due-soon    { background: var(--due-soon-bg);    color: var(--due-soon-text);    font-weight: 600; }

/* ── TAG BADGE ── */
.tag { display: inline-block; padding: 1px 6px; background: #E0E7FF; color: #3730A3; border-radius: 8px; font-size: 10px; font-weight: 600; margin: 1px; }

/* ── ACTION BUTTONS ── */
.act-btn { padding: 3px 7px; border: none; border-radius: 3px; cursor: pointer; font-size: 11px; }
.act-copy { background: #E0F2FE; color: #0369A1; }
.act-edit { background: #E0E7FF; color: #3730A3; }
.act-del  { background: #FEE2E2; color: #DC2626; }
.act-btn:hover { opacity: .8; }

/* ── KANBAN ── */
.kanban { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 14px; }
.kb-col { flex: 0 0 270px; border-radius: 8px; padding: 10px; }
.kb-col[data-s="未着手"] { background: #F8FAFC; border: 1px solid var(--border); }
.kb-col[data-s="進行中"] { background: #EFF8FF; border: 1px solid #BFDBFE; }
.kb-col[data-s="保留"]   { background: #FFFBEB; border: 1px solid #FDE68A; }
.kb-col[data-s="完了"]   { background: #F8F9FA; border: 1px solid #E5E7EB; }
.kb-hdr { font-weight: 800; font-size: 13px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.kb-count { font-size: 11px; background: rgba(0,0,0,.08); padding: 1px 7px; border-radius: 8px; font-weight: 600; }
.kb-card { background: #fff; border-radius: 6px; padding: 10px; margin-bottom: 7px; box-shadow: 0 1px 3px rgba(0,0,0,.08); cursor: pointer; transition: box-shadow .15s; border-left: 3px solid transparent; }
.kb-card:hover { box-shadow: 0 3px 8px rgba(0,0,0,.15); }
.kb-card[data-p="高"] { border-left-color: var(--pri-high); }
.kb-card[data-p="中"] { border-left-color: var(--pri-mid); }
.kb-card[data-p="低"] { border-left-color: var(--pri-low); }
.kb-title { font-weight: 600; font-size: 13px; margin-bottom: 5px; }
.kb-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
.kb-col[data-s="完了"] .kb-title { text-decoration: line-through; color: var(--muted); }

/* ── MODAL ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal { background: #fff; border-radius: 10px; padding: 22px; width: 580px; max-width: 96vw; max-height: 92vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,.25); }
.modal-hdr { font-size: 17px; font-weight: 800; margin-bottom: 16px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
.fg2 { display: flex; flex-direction: column; gap: 3px; }
.fg2 label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; }
.fg2 input, .fg2 select, .fg2 textarea { padding: 7px 9px; border: 1px solid var(--border); border-radius: 5px; font-size: 13px; font-family: inherit; transition: border-color .2s; }
.fg2 input:focus, .fg2 select:focus, .fg2 textarea:focus { outline: none; border-color: var(--primary); }
.fg2 textarea { min-height: 80px; resize: vertical; }
.fg2.span2 { grid-column: 1 / -1; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border); }
.btn { padding: 7px 18px; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: 700; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-sec { background: #F1F5F9; color: var(--text); }
.btn-danger { background: #EF4444; color: #fff; }

/* ── TAG CHECKBOXES ── */
.tag-checks { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-check-item { display: flex; align-items: center; gap: 3px; font-size: 12px; padding: 3px 8px; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all .15s; }
.tag-check-item:has(input:checked) { background: var(--primary); color: #fff; border-color: var(--primary); }
.tag-check-item input { display: none; }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 50px; color: var(--muted); }
.hidden { display: none !important; }
.today-btn { font-size: 10px; padding: 1px 5px; border: 1px solid #CCC; background: #F8F9FA; border-radius: 3px; cursor: pointer; margin-left: 4px; }
.today-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

/* ── TAG EDITOR POPOVER ── */
.tag-editor { position: fixed; background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; box-shadow: 0 4px 20px rgba(0,0,0,.18); z-index: 900; min-width: 160px; }
.tag-editor-row { display: flex; align-items: center; gap: 7px; padding: 4px 2px; cursor: pointer; font-size: 13px; border-radius: 4px; }
.tag-editor-row:hover { background: #F1F5F9; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }

/* ── GROUP PROGRESS ── */
.grp-prog-wrap { max-width:100px; width:80px; background:rgba(0,0,0,.12); border-radius:4px; height:5px; overflow:hidden; }
.grp-prog-fill { height:100%; background:currentColor; border-radius:4px; opacity:.6; }
.grp-prog-txt  { font-size:10px; font-weight:700; opacity:.75; white-space:nowrap; }
.grp-hdr td > div { display:flex; align-items:center; gap:8px; }

/* ── MOBILE CARDS ── */
#mobile-cards { display:none; }
.mob-grp-hdr { display:flex; align-items:center; gap:7px; padding:9px 12px 8px; margin:10px 0 5px; font-size:12px; font-weight:800; background:#F1F5F9; border-radius:8px; cursor:pointer; user-select:none; }
.mob-grp-hdr .grp-arrow { flex-shrink:0; display:inline-block; transition:transform .2s; }
.mob-grp-hdr.grp-collapsed .grp-arrow { transform:rotate(-90deg); }
.mob-grp-hdr.grp-overdue { background:#FEE2E2; color:#DC2626; }
.mob-grp-hdr.grp-today   { background:#FECACA; color:#991B1B; }
.mob-grp-hdr.grp-soon    { background:#FEFCE8; color:#78350F; }
.mob-grp-body.hidden      { display:none; }
.task-card { background:#fff; border-radius:10px; padding:13px 14px; margin-bottom:8px; box-shadow:0 1px 4px rgba(0,0,0,.08); cursor:pointer; border-left:4px solid #E5E7EB; transition:transform .1s, box-shadow .15s; }
.task-card:active { transform:scale(.98); }

/* ── DETAIL SHEET ── */
.detail-modal { border-radius:20px 20px 0 0; max-height:90vh; width:100%; padding:20px 16px 24px; overflow-y:auto; }
.ds-row { display:flex; align-items:flex-start; gap:8px; padding:9px 0; border-bottom:1px solid #F1F5F9; font-size:14px; }
.ds-label { font-size:11px; font-weight:700; color:var(--muted); width:56px; flex-shrink:0; text-transform:uppercase; letter-spacing:.3px; padding-top:2px; }
.ds-val { flex:1; line-height:1.5; }
.ds-detail-box { background:#F8FAFC; border-radius:8px; padding:10px 12px; font-size:13px; line-height:1.7; white-space:pre-wrap; word-break:break-all; margin-top:4px; max-height:130px; overflow-y:auto; }
.ds-detail-box a { color:var(--primary); }
.task-card.row-done    { background:var(--row-done); border-left-color:#D1D5DB; }
.task-card.row-overdue { background:#FEE2E2; border-left-color:#EF4444; }
.task-card.row-today   { background:#FECACA; border-left-color:#DC2626; }
.task-card.row-soon    { background:#FEFCE8; border-left-color:#F59E0B; }
.task-card.row-hold    { background:var(--row-hold); border-left-color:var(--row-hold-accent); }
.task-card.row-wip     { background:var(--row-wip); border-left-color:var(--row-wip-accent); }
.card-top  { display:flex; align-items:flex-start; gap:10px; margin-bottom:8px; }
.card-name { flex:1; font-weight:600; font-size:15px; line-height:1.35; }
.card-name.done-text { color:var(--row-done-text); }
.card-sub  { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.card-foot { display:flex; flex-wrap:wrap; gap:4px; align-items:center; }
.sp { font-size:11px; font-weight:700; padding:2px 8px; border-radius:10px; }
.sp-未着手 { background:#E5E7EB; color:#374151; }
.sp-進行中 { background:#DBEAFE; color:#1E40AF; }
.sp-保留   { background:#FEF3C7; color:#92400E; }
.sp-完了   { background:#D1FAE5; color:#065F46; }

/* ── FAB ── */
.fab { display:none; position:fixed; bottom:22px; right:18px; width:54px; height:54px; border-radius:50%; background:var(--primary); color:#fff; border:none; font-size:26px; cursor:pointer; box-shadow:0 4px 14px rgba(74,144,217,.55); z-index:700; align-items:center; justify-content:center; transition:transform .15s; }
.fab:active { transform:scale(.93); }

/* ── MOBILE FILTER TOGGLE ── */
.mob-filter-btn { display:none; padding:3px 11px; border:1px solid var(--border); background:#fff; border-radius:12px; cursor:pointer; font-size:12px; white-space:nowrap; }
.mob-filter-btn.has-filter { background:var(--primary); color:#fff; border-color:var(--primary); }

/* ── RESPONSIVE ── */
@media (max-width: 767px) {
  /* Header */
  .app-header { padding:8px 12px; gap:8px; }
  .app-title  { font-size:15px; }
  .hdr-btn    { display:none; }
  .view-btn   { padding:5px 10px; font-size:12px; }

  /* Quick filters: horizontal scroll */
  .quick-row { overflow-x:auto; flex-wrap:nowrap; padding:6px 12px; scrollbar-width:none; }
  .quick-row::-webkit-scrollbar { display:none; }
  .mob-filter-btn { display:inline-block; }

  /* Filter bar: hidden by default, toggled */
  .filter-bar { display:none; flex-direction:column; gap:8px; position:relative; }
  .filter-bar.mob-open { display:flex; }
  .fg select, .fg input { min-width:0; width:100%; }
  .reset-btn { width:100%; }

  /* Stats */
  .stats-bar { overflow-x:auto; flex-wrap:nowrap; scrollbar-width:none; padding:5px 12px; }
  .stats-bar::-webkit-scrollbar { display:none; }

  /* Main */
  .main { padding:10px 12px 80px; }
  .add-bar-wrap { display:none; }  /* FABで代替 */

  /* Table → Cards */
  .tbl-wrap  { display:none; }
  #tbl-empty { display:none; }
  #mobile-cards { display:block; }

  /* Kanban: touch-friendly */
  .kb-col  { flex:0 0 260px; }
  .kb-card { padding:13px; }

  /* Modal: bottom sheet */
  .overlay { align-items:flex-end; }
  .modal   { border-radius:20px 20px 0 0; max-height:94vh; width:100%; padding:20px 16px 28px; }
  .form-grid { grid-template-columns:1fr; }
  .fg2.span2 { grid-column:1; }

  /* FAB */
  .fab { display:flex; }
}
</style>
</head>
<body>

<div class="sticky-top">
<!-- HEADER -->
<header class="app-header">
  <span class="app-title">📋 TODO Manager</span>
  <div class="view-toggle">
    <button class="view-btn active" id="btn-table"  onclick="switchView('table')">📄 リスト</button>
    <button class="view-btn"        id="btn-kanban" onclick="switchView('kanban')">📌 カンバン</button>
  </div>
  <button class="hdr-btn" onclick="exportData()" title="JSONエクスポート">⬇ Export</button>
  <button class="hdr-btn" onclick="document.getElementById('import-file').click()" title="JSONインポート">⬆ JSON</button>
  <button class="hdr-btn" onclick="document.getElementById('csv-file').click()" title="スプレッドシートCSVインポート">📊 CSV</button>
</header>

<!-- QUICK FILTERS -->
<div class="quick-row">
  <span class="quick-label">クイック:</span>
  <button class="qf-btn" data-preset="wip"     onclick="applyPreset(this)">🔵 進行中</button>
  <button class="qf-btn" data-preset="pending" onclick="applyPreset(this)">⬜ 未着手</button>
  <button class="qf-btn" data-preset="hold"    onclick="applyPreset(this)">🟡 保留</button>
  <button class="qf-btn" data-preset="due3"    onclick="applyPreset(this)">🔴 期日3日以内</button>
  <button class="qf-btn" data-preset="high"    onclick="applyPreset(this)">❗ 優先度:高</button>
  <button class="qf-btn" data-preset="main"    onclick="applyPreset(this)">📺 メインCH</button>
  <button class="qf-btn" data-preset="spinoff" onclick="applyPreset(this)">🎬 スピンオフ</button>
  <button class="qf-btn" data-preset="biz"     onclick="applyPreset(this)">📁 採用・事務</button>
  <span style="width:1px;background:var(--border);align-self:stretch;margin:0 4px"></span>
  <button class="qf-btn" id="toggle-done" onclick="toggleHideDone()">👁 完了を非表示</button>
  <button class="mob-filter-btn" id="mob-filter-btn" onclick="toggleMobFilter()">🔍 絞り込み</button>
</div>

<!-- FILTER BAR -->
<div class="filter-bar" id="filter-bar">
  <div class="fg"><label>ステータス</label>
    <select id="f-status" onchange="applyFilters()">
      <option value="">すべて</option>
      <option>未着手</option><option>進行中</option><option>保留</option><option>完了</option>
    </select>
  </div>
  <div class="fg"><label>優先度</label>
    <select id="f-priority" onchange="applyFilters()">
      <option value="">すべて</option>
      <option>高</option><option>中</option><option>低</option>
    </select>
  </div>
  <div class="fg"><label>タグ</label>
    <select id="f-tag" onchange="applyFilters()">
      <option value="">すべて</option>
    </select>
  </div>

<!-- STATS -->

  <!-- Quick add (sticky-top内) -->

const PRI_ORDER    = { 高: 0, 中: 1, 低: 2 };
const ST_ORDER     = { 進行中: 0, 未着手: 1, 保留: 2, 完了: 3 };

let view     = 'table';
let sortKey  = 'createdAt';
let sortDir  = -1; // -1 = desc (newest first)
let filters  = { status:'', priority:'', tag:'', kw:'', from:'', to:'', preset:'' };

// ── UTILS ──
const uid  = () => crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2);
const today = () => new Date().toISOString().slice(0,10);
const addD  = (s, n) => { const d=new Date(s); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
const fmtD  = s => s ? s.slice(5).replace('-','/') : '';
const diff  = s => { if(!s) return null; const t=new Date(); t.setHours(0,0,0,0); const d=new Date(s); d.setHours(0,0,0,0); return Math.round((d-t)/864e5); };

function linkify(txt) {
  if(!txt) return '';
  return txt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>')
    .replace(/\n/g,'<br>');
}

// ── STORAGE ──
function save() {
  localStorage.setItem('todo_v2', JSON.stringify({tasks, allTags}));
}
function load() {

    const d = JSON.parse(localStorage.getItem('todo_v2')||'null');
    if(d) { tasks = d.tasks||[]; allTags = d.allTags||[...DEFAULT_TAGS]; }
    else   { tasks = demo(); save(); }

}

// ── FILTER & SORT ──
function filtered() {
  let r = [...tasks];

  // sort
  r.sort((a,b) => {
    let av = a[sortKey]??'', bv = b[sortKey]??'';
    if(sortKey==='priority') { av=PRI_ORDER[av]??9; bv=PRI_ORDER[bv]??9; return (av-bv)*sortDir; }
    if(sortKey==='status')   { av=ST_ORDER[av]??9; bv=ST_ORDER[bv]??9; return (av-bv)*sortDir; }
    if(sortKey==='progress') return (Number(av)-Number(bv))*sortDir;
    return av<bv ? sortDir : av>bv ? -sortDir : 0;
  });

  // 完了非表示
  if(hideDone) r = r.filter(t=>t.status!=='完了');

  // filters (all AND)
  if(filters.status)   r = r.filter(t=>t.status===filters.status);
  if(filters.priority) r = r.filter(t=>t.priority===filters.priority);
  if(filters.tag)      r = r.filter(t=>(t.tags||[]).includes(filters.tag));
  if(filters.kw)       { const k=filters.kw.toLowerCase(); r = r.filter(t=>t.name.toLowerCase().includes(k)||(t.detail||'').toLowerCase().includes(k)); }
  if(filters.from)     r = r.filter(t=>t.dueDate>=filters.from);
  if(filters.to)       r = r.filter(t=>t.dueDate<=filters.to);
  if(filters.preset==='due3') {
    const lim = addD(today(),3);
    r = r.filter(t=>t.dueDate && t.dueDate<=lim && t.status!=='完了');
  }
  return r;
}

// ── RENDER ──
function render() {
  const list = filtered();
  renderStats(list);
  rebuildTagSelect();
  if(view==='table') renderTable(list);
  else               renderKanban(list);
}

function renderStats(list) {
  const all = tasks;
  const over = all.filter(t=>t.dueDate&&diff(t.dueDate)<0&&t.status!=='完了').length;
  document.getElementById('stats-bar').innerHTML = `
    <span class="stat">表示 <strong>${list.length}</strong>/${all.length}</span>
    <span class="stat">未着手 <strong>${all.filter(t=>t.status==='未着手').length}</strong></span>
    <span class="stat">進行中 <strong>${all.filter(t=>t.status==='進行中').length}</strong></span>
    <span class="stat">保留 <strong>${all.filter(t=>t.status==='保留').length}</strong></span>
    <span class="stat">完了 <strong>${all.filter(t=>t.status==='完了').length}</strong></span>
    ${over?`<span class="stat warn">⚠ 期日超過 <strong>${over}</strong></span>`:''}
  `;
}

function dueChip(dueDate, status) {
  if(!dueDate) return '<span style="color:#CBD5E1">━</span>';
  const d = diff(dueDate);
  let cls='', tip='';
  if(status!=='完了') {
    if(d<0)   { cls='due-overdue'; tip=`${Math.abs(d)}日超過`; }
    else if(d===0) { cls='due-today'; tip='今日が期日！'; }
    else if(d<=3)  { cls='due-soon';  tip=`あと${d}日`; }
  }
  return `<span class="due-chip ${cls}" title="${tip}">${fmtD(dueDate)}${tip?` (${tip})`:''}</span>`;
}

function progBar(p) {
  const col = p>=100 ? '#22C55E' : p>=50 ? '#4A90D9' : '#F97316';
  return `<div class="prog-bg"><div class="prog-fill" style="width:${p}%;background:${col}"></div></div>`;
}

// ── MOBILE DETECT ──
const isMobile = () => window.innerWidth < 768;

// ── MOBILE DETAIL SHEET ──
let detailId = null;

function openDetail(id) {

function toggleMobFilter() {
  const bar = document.getElementById('filter-bar');
  const btn = document.getElementById('mob-filter-btn');
  bar.classList.toggle('mob-open');
  const open = bar.classList.contains('mob-open');
  btn.textContent = open ? '✕ 閉じる' : '🔍 絞り込み';
  btn.classList.toggle('has-filter', open || hasActiveFilter());
}
function hasActiveFilter() {
  return !!(filters.status||filters.priority||filters.tag||filters.kw||filters.from||filters.to||filters.preset);
}

// ── GROUP PROGRESS ──
function grpProgress(tasks) {
  if(!tasks.length) return 0;
  return Math.round(tasks.reduce((s,t)=>s+t.progress,0)/tasks.length);
}

// ── ROW CLASS（期日urgency優先、完了は最優先）──
function rowClass(t) {
  if(t.status==='完了') return 'row-done';
  if(t.dueDate) {
    const d = diff(t.dueDate);
    if(d < 0)  return 'row-overdue';
    if(d === 0) return 'row-today';
    if(d <= 3)  return 'row-soon';
  }
  if(t.status==='保留')   return 'row-hold';
  if(t.status==='進行中') return 'row-wip';
  return 'row-normal';
}

// ── DATE GROUPING ──
function groupByDate(list) {
  const map = new Map();
  list.forEach(t => {
    const k = t.dueDate || '___none';
    if(!map.has(k)) map.set(k, []);
    map.get(k).push(t);
  });
  const keys = [...map.keys()].sort((a,b)=>{
    if(a==='___none') return 1;
    if(b==='___none') return -1;
    return a<b?-1:a>b?1:0;
  });
  return keys.map(k => {
    const d = k!=='___none' ? diff(k) : null;
    const dd = k!=='___none' ? fmtD(k) : '';
    let label, cls='';
    if(k==='___none') { label='📭 期日なし'; }
    else if(d<0)      { label=`🔴 ${dd}（${Math.abs(d)}日超過）`; cls='grp-overdue'; }
    else if(d===0)    { label=`🔴 今日 ${dd}`; cls='grp-today'; }
    else if(d===1)    { label=`🟠 明日 ${dd}`; cls='grp-soon'; }
    else if(d<=3)     { label=`🟡 ${dd}（あと${d}日）`; cls='grp-soon'; }
    else              { label=`📅 ${dd}`; }
    return { key: k, cls, label, tasks: map.get(k) };
  });
}

  return `

    <td>
      <span class="ec" onclick="inlineDate(this,'${t.id}','startedAt')">${fmtD(t.startedAt)||'<span style="color:#CBD5E1">━</span>'}</span>
      ${!t.startedAt?`<button class="today-btn" onclick="setField('${t.id}','startedAt',today())" title="今日をセット">今日</button>`:''}
    </td>
    <td class="ec" onclick="inlineDate(this,'${t.id}','dueDate')">${dueChip(t.dueDate,t.status)}</td>

function renderTable(list) {
  if(isMobile()) { renderCards(list); return; }
  document.getElementById('mobile-cards').innerHTML = '';
  const tb = document.getElementById('tbody');
  document.getElementById('tbl-empty').classList.toggle('hidden', list.length>0);
  if(!list.length) { tb.innerHTML=''; return; }

  const groups = groupByDate(list);
  let html = '';
  groups.forEach(({key, label, cls, tasks:gt}) => {
    const collapsed = collapsedGroups.has(key);
    const pct = grpProgress(gt);
    html += `<tr class="grp-hdr ${cls}${collapsed?' grp-collapsed':''}" data-key="${key}" onclick="toggleGroup('${key}')"><td colspan="11"><div><i class="grp-arrow">▼</i><span>${label}</span><span class="grp-count">${gt.length}件</span><div class="grp-prog-wrap"><div class="grp-prog-fill" style="width:${pct}%"></div></div><span class="grp-prog-txt">${pct}%</span></div></td></tr>`;
    gt.forEach(t => { html += renderRow(t).replace('<tr ', `<tr data-grp="${key}" `); });
  });
  tb.innerHTML = html;

  // 折りたたみ中のグループ行を非表示
  collapsedGroups.forEach(key => {
    tb.querySelectorAll('tr[data-grp]').forEach(r => {
      if(r.dataset.grp === key) r.classList.add('grp-row-hidden');
    });
  });
}

// ── GROUP COLLAPSE ──
const collapsedGroups = new Set();

function toggleGroup(key) {
  if(collapsedGroups.has(key)) collapsedGroups.delete(key);
  else collapsedGroups.add(key);
  const isCollapsed = collapsedGroups.has(key);

  // ヘッダーの矢印回転
  const tb = document.getElementById('tbody');
  tb.querySelectorAll('tr.grp-hdr').forEach(hdr => {
    if(hdr.dataset.key === key) hdr.classList.toggle('grp-collapsed', isCollapsed);
  });

  // 配下の行を表示/非表示
  tb.querySelectorAll('tr[data-grp]').forEach(r => {
    if(r.dataset.grp === key) r.classList.toggle('grp-row-hidden', isCollapsed);
  });
}

// ── MOBILE CARD RENDERING ──
function cardHTML(t) {
  const d = t.dueDate ? diff(t.dueDate) : null;
  let dueTxt='', dueStyle='color:var(--muted)';
  if(d!==null) {
    if(d<0)   { dueTxt=`${Math.abs(d)}日超過`; dueStyle='color:#DC2626;font-weight:700'; }
    else if(d===0) { dueTxt='今日が期日';       dueStyle='color:#B91C1C;font-weight:700'; }
    else if(d<=3)  { dueTxt=`あと${d}日`;       dueStyle='color:#92400E;font-weight:600'; }
    else           { dueTxt=`あと${d}日`; }
  }
  const progCol = t.progress>=100?'#22C55E':t.progress>=50?'#4A90D9':'#F97316';
  return `
    <div class="card-top">
      <input type="checkbox" ${t.status==='完了'?'checked':''} onclick="event.stopPropagation()"
        onchange="toggleDone('${t.id}',this.checked)"
        style="width:18px;height:18px;flex-shrink:0;accent-color:var(--primary);cursor:pointer;margin-top:2px">
      <div class="card-name ${t.status==='完了'?'done-text':''}">${t.name}</div>
      <span class="pri pri-${t.priority}">${t.priority}</span>
    </div>
    <div class="card-sub">
      ${t.dueDate?`<span style="font-size:12px;${dueStyle}">📅 ${fmtD(t.dueDate)}${dueTxt?' · '+dueTxt:''}</span>`:''}
      <div class="prog-bg" style="flex:1;margin:0 4px"><div class="prog-fill" style="width:${t.progress}%;background:${progCol}"></div></div>
      <span style="font-size:11px;color:var(--muted);flex-shrink:0">${t.progress}%</span>
    </div>
    <div class="card-foot">
      <span class="sp sp-${t.status}">${t.status}</span>
      ${(t.tags||[]).map(g=>`<span class="tag">${g}</span>`).join('')}
    </div>`;
}

function renderCards(list) {
  const container = document.getElementById('mobile-cards');
  if(!list.length) { container.innerHTML='<div class="empty">タスクがありません</div>'; return; }

  const groups = groupByDate(list);
  container.innerHTML = '';

  groups.forEach(({key, label, cls, tasks:gt}) => {
    const collapsed = collapsedGroups.has(key);
    const pct = grpProgress(gt);

    // グループヘッダー
    const hdr = document.createElement('div');
    hdr.className = `mob-grp-hdr ${cls}${collapsed?' grp-collapsed':''}`;
    hdr.dataset.key = key;
    hdr.innerHTML = `<i class="grp-arrow">▼</i><span style="flex:1">${label}</span><span class="grp-count">${gt.length}件</span><div class="grp-prog-wrap" style="max-width:60px"><div class="grp-prog-fill" style="width:${pct}%"></div></div><span class="grp-prog-txt">${pct}%</span>`;
    hdr.onclick = () => {
      if(collapsedGroups.has(key)) collapsedGroups.delete(key);
      else collapsedGroups.add(key);
      hdr.classList.toggle('grp-collapsed', collapsedGroups.has(key));
      body.classList.toggle('hidden', collapsedGroups.has(key));
    };
    container.appendChild(hdr);

    // カードグループ
    const body = document.createElement('div');
    body.className = 'mob-grp-body' + (collapsed?' hidden':'');
    gt.forEach(t => {
      const card = document.createElement('div');
      card.className = `task-card ${rowClass(t)}`;
      card.innerHTML = cardHTML(t);
      card.onclick = () => openDetail(t.id);
      body.appendChild(card);
    });
    container.appendChild(body);
  });
}

// ── INLINE SELECT ──
function inlineSelect(cell, id, field, options) {
  if(cell.querySelector('select.isel')) return;
  const t = tasks.find(t=>t.id===id); if(!t) return;
  const sel = document.createElement('select');
  sel.className = 'isel';
  sel.style.cssText = 'padding:3px 6px;border:2px solid var(--primary);border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;outline:none;';
  options.forEach(o => {
    const opt = document.createElement('option');
    opt.value=o; opt.textContent=o; if(t[field]===o) opt.selected=true;
    sel.appendChild(opt);
  });
  cell.innerHTML=''; cell.appendChild(sel); sel.focus();
  sel.onchange = () => { setField(id, field, sel.value); };
  sel.onblur   = () => { setField(id, field, sel.value); };
  sel.onkeydown = e => { if(e.key==='Escape') render(); };
}

// ── TAG EDITOR POPOVER ──
function openTagEditor(e, id) {
  e.stopPropagation();
  document.querySelectorAll('.tag-editor').forEach(el=>el.remove());
  const t = tasks.find(t=>t.id===id); if(!t) return;

  const tagSet = new Set(DEFAULT_TAGS);
  tasks.forEach(tk=>(tk.tags||[]).forEach(g=>tagSet.add(g)));

  const editor = document.createElement('div');
  editor.className = 'tag-editor';
  editor.style.visibility = 'hidden'; // 測定中は非表示

  editor.innerHTML = `
    <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;">タグを選択</div>
    ${[...tagSet].map(g=>`
      <label class="tag-editor-row">
        <input type="checkbox" value="${g}" ${(t.tags||[]).includes(g)?'checked':''}
          style="accent-color:var(--primary);width:14px;height:14px;cursor:pointer">
        <span>${g}</span>
      </label>`).join('')}
    <div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px;display:flex;gap:6px;">
      <button onclick="addTagFromEditor(this)" style="font-size:11px;padding:3px 8px;background:none;border:1px dashed #CBD5E1;border-radius:8px;cursor:pointer;color:var(--muted)">＋ 新タグ</button>
      <button onclick="saveTagEditor('${id}',this.closest('.tag-editor'))" style="flex:1;padding:4px;background:var(--primary);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:700">保存</button>
    </div>`;

  document.body.appendChild(editor);

  // DOMに追加後に実サイズを測って位置を確定
  const eh = editor.offsetHeight;
  const ew = editor.offsetWidth;
  let x = Math.min(e.clientX, window.innerWidth - ew - 8);
  let y = e.clientY + 8;
  // 下にはみ出る場合は上に反転
  if(y + eh > window.innerHeight - 8) y = e.clientY - eh - 8;
  editor.style.left = x + 'px';
  editor.style.top  = Math.max(8, y) + 'px';
  editor.style.visibility = '';

  setTimeout(() => {
    document.addEventListener('click', function close(ev) {
      if(!editor.contains(ev.target)) { editor.remove(); document.removeEventListener('click',close); }
    });
  }, 0);
}

function addTagFromEditor(btn) {
  const name = prompt('新しいタグ名:'); if(!name?.trim()) return;
  const g = name.trim();
  const editor = btn.closest('.tag-editor');
  const addBtn = editor.querySelector('button');
  const row = document.createElement('label');
  row.className = 'tag-editor-row';
  row.innerHTML = `<input type="checkbox" value="${g}" checked style="accent-color:var(--primary);width:14px;height:14px;cursor:pointer"><span>${g}</span>`;
  editor.querySelector('div:last-child').before(row);

function saveTagEditor(id, editor) {
  const checked = [...editor.querySelectorAll('input:checked')].map(cb=>cb.value);
  setField(id, 'tags', checked);
  editor.remove();
}

// ── INLINE EDIT ──
function inlineText(cell, id, field) {
  if(cell.querySelector('input')) return;
  const t = tasks.find(t=>t.id===id); if(!t) return;
  const orig = t[field]||'';
  const inp = document.createElement('input');
  inp.type='text'; inp.value=orig;
  cell.innerHTML=''; cell.appendChild(inp); inp.focus(); inp.select();
  const done = ()=>{ const v=inp.value; if(v!==orig) setField(id,field,v); else render(); };
  inp.onblur=done;
  inp.onkeydown=e=>{ if(e.key==='Enter')inp.blur(); if(e.key==='Escape'){cell.innerHTML=orig||''; } };
}

function inlineDate(cell, id, field) {
  if(cell.querySelector('input')) return;
  const t = tasks.find(t=>t.id===id); if(!t) return;
  const orig = t[field]||'';
  const inp = document.createElement('input');
  inp.type='date'; inp.value=orig;
  cell.innerHTML=''; cell.appendChild(inp); inp.focus();
  const done = ()=>{ const v=inp.value; if(v!==orig) setField(id,field,v); else render(); };
  inp.onblur=done;
  inp.onkeydown=e=>{ if(e.key==='Enter')inp.blur(); if(e.key==='Escape'){render();} };
}

// ── FIELD UPDATE (with auto-sync) ──
function setField(id, field, value) {
  const t = tasks.find(t=>t.id===id); if(!t) return;
  t[field] = value;

  if(field==='status') {
    if(value==='進行中') {
      if(!t.startedAt) t.startedAt=today();
      if(t.progress===0) t.progress=10;
    }
    if(value==='完了') {
      t.progress=100;
      if(!t.completedAt) t.completedAt=today();
    } else {
      t.completedAt=null;
    }
  }

  if(field==='progress') {
    const p=Number(value);
    if(p===100 && t.status!=='完了') {
      t.status='完了'; if(!t.completedAt) t.completedAt=today();
    } else if(p>0 && p<100 && t.status==='完了') {
      t.status='進行中'; t.completedAt=null;
    } else if(p>0 && t.status==='未着手') {
      t.status='進行中'; if(!t.startedAt) t.startedAt=today();
    } else if(p===0 && t.status==='進行中') {
      t.status='未着手';
    }
    if(p<100) t.completedAt=null;
  }

  save(); render();
}

function toggleDone(id, checked) { setField(id,'status',checked?'完了':'未着手'); }

// ── SORT ──
function sortBy(k) {

  document.querySelectorAll('[id^="si-"]').forEach(el=>el.textContent='');
  const el=document.getElementById('si-'+k);
  if(el) el.textContent = sortDir===1?' ▲':' ▼';
  render();
}

// ── FILTERS ──
function applyFilters() {
  filters.status   = document.getElementById('f-status').value;
  filters.priority = document.getElementById('f-priority').value;
  filters.tag      = document.getElementById('f-tag').value;
  filters.kw       = document.getElementById('f-kw').value;
  filters.from     = document.getElementById('f-from').value;
  filters.to       = document.getElementById('f-to').value;
  filters.preset   = '';
  document.querySelectorAll('.qf-btn').forEach(b=>b.classList.remove('active'));
  render();
}

function resetFilters() {
  filters = { status:'', priority:'', tag:'', kw:'', from:'', to:'', preset:'' };
  ['f-status','f-priority','f-tag'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-kw').value='';
  document.getElementById('f-from').value='';
  document.getElementById('f-to').value='';
  document.querySelectorAll('.qf-btn').forEach(b=>b.classList.remove('active'));
  render();
}

function applyPreset(btn) {
  // 同じボタンを再クリックしたら解除
  if(btn.classList.contains('active')) { resetFilters(); return; }
  resetFilters();
  const p = btn.dataset.preset;
  filters.preset = p;
  btn.classList.add('active');
  if(p==='wip')     { filters.status='進行中';   document.getElementById('f-status').value='進行中'; }
  if(p==='pending') { filters.status='未着手';   document.getElementById('f-status').value='未着手'; }
  if(p==='hold')    { filters.status='保留';     document.getElementById('f-status').value='保留'; }
  if(p==='high')    { filters.priority='高';     document.getElementById('f-priority').value='高'; }
  if(p==='main')    { filters.tag='メインチャンネル'; document.getElementById('f-tag').value='メインチャンネル'; }
  if(p==='spinoff') { filters.tag='スピンオフ';  document.getElementById('f-tag').value='スピンオフ'; }
  if(p==='biz')     { filters.tag='採用・事務';  document.getElementById('f-tag').value='採用・事務'; }
  // due3 handled in filtered()
  render();
}

function rebuildTagSelect() {
  const tagSet = new Set(DEFAULT_TAGS);
  tasks.forEach(t=>(t.tags||[]).forEach(g=>tagSet.add(g)));
  allTags = [...tagSet];
  const sel = document.getElementById('f-tag');
  const cur = sel.value;

// ── QUICK ADD ──
function quickAdd() {
  const inp = document.getElementById('quick-input');
  const name = inp.value.trim(); if(!name) return;
  tasks.unshift({ id:uid(), createdAt:today(), startedAt:'', completedAt:null,
    dueDate:'', name, detail:'', progress:0, priority:'中', status:'未着手', tags:[] });
  inp.value=''; save(); render();
}

// ── DUPLICATE ──
function copyTask(id) {
  const t = tasks.find(t=>t.id===id); if(!t) return;
  const dup = {
    id: uid(),
    name: t.name,
    detail: t.detail,
    createdAt: today(),
    startedAt: '',
    completedAt: null,
    dueDate: '',
    progress: 0,
    priority: '中',
    status: '未着手',
    tags: []
  };
  tasks.unshift(dup);
  save(); render();
  // ボタンを一瞬「✓」に変えてフィードバック
  const btn = document.querySelector(`tr[data-id="${id}"] .act-copy`);
  if(btn) { const orig=btn.textContent; btn.textContent='✓'; setTimeout(()=>btn.textContent=orig, 1000); }
}

// ── DELETE ──
function delTask(id) {
  if(!confirm('このタスクを削除しますか？')) return;
  tasks = tasks.filter(t=>t.id!==id); save(); render();
}

// ── MODAL ──
function buildTagChecks(selected=[]) {
  const tagSet = new Set(DEFAULT_TAGS);
  tasks.forEach(t=>(t.tags||[]).forEach(g=>tagSet.add(g)));
  const container = document.getElementById('m-tags');
  container.innerHTML = [...tagSet].map(g=>`
    <label class="tag-check-item">
      <input type="checkbox" value="${g}" ${selected.includes(g)?'checked':''}>${g}
    </label>`).join('')
    + `<button type="button" onclick="addTag()" style="font-size:11px;padding:3px 10px;border:1px dashed #CBD5E1;background:none;border-radius:10px;cursor:pointer">＋ 新タグ</button>`;
}

function addTag() {
  const name = prompt('新しいタグ名:'); if(!name?.trim()) return;
  const g = name.trim();
  if(!allTags.includes(g)) allTags.push(g);
  const cur = getCheckedTags();
  buildTagChecks([...cur, g]);
}

function getCheckedTags() {
  return [...document.querySelectorAll('#m-tags input:checked')].map(cb=>cb.value);
}

function openModal(id) {
  editId = id;
  const isNew = !id;
  document.getElementById('modal-hdr').textContent = isNew ? 'タスク追加' : 'タスク編集';
  document.getElementById('m-del').classList.toggle('hidden', isNew);

  if(isNew) {
    document.getElementById('m-name').value='';
    document.getElementById('m-status').value='未着手';
    document.getElementById('m-priority').value='中';
    document.getElementById('m-progress').value='0';
    document.getElementById('m-due').value='';
    document.getElementById('m-started').value='';
    document.getElementById('m-created').value=today();
    document.getElementById('m-detail').value='';
    buildTagChecks([]);
  } else {
    const t = tasks.find(t=>t.id===id); if(!t) return;
    document.getElementById('m-name').value=t.name;
    document.getElementById('m-status').value=t.status;
    document.getElementById('m-priority').value=t.priority;
    document.getElementById('m-progress').value=String(t.progress);
    document.getElementById('m-due').value=t.dueDate||'';
    document.getElementById('m-started').value=t.startedAt||'';
    document.getElementById('m-created').value=t.createdAt||'';
    document.getElementById('m-detail').value=t.detail||'';
    buildTagChecks(t.tags||[]);
  }
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('m-name').focus();
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); editId=null; }

function onStatusChange() {
  const s = document.getElementById('m-status').value;
  if(s==='進行中') {
    if(document.getElementById('m-progress').value==='0') document.getElementById('m-progress').value='10';
    if(!document.getElementById('m-started').value) document.getElementById('m-started').value=today();
  }
  if(s==='完了') document.getElementById('m-progress').value='100';
}

function saveModal() {
  const name = document.getElementById('m-name').value.trim();
  if(!name) { alert('タスク名を入力してください'); return; }
  const data = {
    name,
    status:   document.getElementById('m-status').value,
    priority: document.getElementById('m-priority').value,
    progress: +document.getElementById('m-progress').value,
    dueDate:  document.getElementById('m-due').value,
    startedAt:document.getElementById('m-started').value,
    createdAt:document.getElementById('m-created').value||today(),
    detail:   document.getElementById('m-detail').value,
    tags:     getCheckedTags()
  };
  if(data.status==='完了') data.completedAt = today();
  else data.completedAt = null;

  if(editId) {
    const idx = tasks.findIndex(t=>t.id===editId);
    if(idx>=0) tasks[idx] = { ...tasks[idx], ...data };
  } else {
    tasks.unshift({ id:uid(), ...data });
  }
  save(); closeModal(); render();
}

function deleteFromModal() {
  if(!editId||!confirm('このタスクを削除しますか？')) return;
  tasks=tasks.filter(t=>t.id!==editId); save(); closeModal(); render();
}

// ── VIEW SWITCH ──
function switchView(v) {
  view=v;
  document.getElementById('view-table').classList.toggle('hidden',v!=='table');
  document.getElementById('view-kanban').classList.toggle('hidden',v!=='kanban');
  document.getElementById('btn-table').classList.toggle('active',v==='table');
  document.getElementById('btn-kanban').classList.toggle('active',v==='kanban');
  render();
}

// ── EXPORT / IMPORT ──
function exportData() {
  const payload = {
    version: '1.0',
    exportedAt: new Date().toISOString(),
    tasks, allTags,
    // Placeholders for future integrations
    _discordConfig:  { webhookUrl:'', enabled:false, notifyDaysBefore:[0,1] },
    _calendarConfig: { googleCalendarEnabled:false, iCalFeedEnabled:false }
  };
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}));
  a.download = `tasks_${today()}.json`;
  a.click();
}

function handleImport(e) {
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try {
      const d=JSON.parse(ev.target.result);
      if(!Array.isArray(d.tasks)) { alert('不正なJSONです'); return; }
      if(!confirm(`${d.tasks.length}件をインポートします（重複IDは上書き）。続行しますか？`)) return;
      const map=Object.fromEntries(tasks.map(t=>[t.id,t]));
      d.tasks.forEach(t=>map[t.id]=t);
      tasks=Object.values(map);
      if(d.allTags) allTags=[...new Set([...allTags,...d.allTags])];
      save(); render(); alert('インポート完了');
    } catch(err){ alert('JSONの解析エラー: '+err.message); }
  };
  r.readAsText(f); e.target.value='';
}

// ── CSV IMPORT ──
function handleCSVImport(e) {
  const f = e.target.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = parseSheetCSV(ev.target.result);
      if(!imported.length) { alert('取り込めるタスクが見つかりませんでした。'); return; }
      if(!confirm(`${imported.length}件のタスクをインポートします。既存データに追加されます。続行しますか？`)) return;
      tasks = [...imported, ...tasks];
      save(); render();
      alert(`${imported.length}件をインポートしました！`);
    } catch(err) { alert('CSVの解析エラー: ' + err.message); }
  };
  reader.readAsText(f, 'UTF-8');
  e.target.value='';
}

function parseSheetCSV(text) {
  const lines = text.replace(/\r/g,'').split('\n');
  // ヘッダー行を探す（「起票」「タスク」が含まれる行）
  let headerIdx = -1;
  for(let i=0; i<lines.length; i++) {
    if(lines[i].includes('起票') && lines[i].includes('タスク')) { headerIdx=i; break; }
  }
  if(headerIdx<0) { alert('ヘッダー行が見つかりません（「起票」「タスク」列が必要です）'); return []; }

  const headers = splitCSV(lines[headerIdx]);
  const ci = {
    created:  headers.findIndex(h=>h.includes('起票')),
    started:  headers.findIndex(h=>h.includes('着手')),
    due:      headers.findIndex(h=>h.includes('期日')),
    name:     headers.findIndex(h=>h.includes('タスク')),
    detail:   headers.findIndex(h=>h.includes('詳細')),
    progress: headers.findIndex(h=>h.includes('進捗')),
    priority: headers.findIndex(h=>h.includes('優先')),
    status:   headers.findIndex(h=>h.includes('ステータス'))
  };

  const yr = new Date().getFullYear();
  const toDate = s => {
    if(!s?.trim()) return '';
    const m = s.trim().match(/^(\d{1,2})\/(\d{1,2})$/);
    if(!m) return '';
    return `${yr}-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`;
  };
  const toProgress = s => { if(!s?.trim()) return 0; return Math.min(100,Math.max(0,parseInt(s.replace('%',''))||0)); };

  const result = [];
  for(let i=headerIdx+1; i<lines.length; i++) {
    const cells = splitCSV(lines[i]);
    const name = ci.name>=0 ? cells[ci.name]?.trim() : '';
    if(!name) continue;
    result.push({
      id: uid(),
      createdAt:  toDate(cells[ci.created]),
      startedAt:  toDate(cells[ci.started]),
      completedAt: null,
      dueDate:    toDate(cells[ci.due]),
      name,
      detail:     ci.detail>=0  ? (cells[ci.detail]?.trim()||'')   : '',
      progress:   ci.progress>=0 ? toProgress(cells[ci.progress])   : 0,
      priority:   ci.priority>=0 ? (cells[ci.priority]?.trim()||'中') : '中',
      status:     ci.status>=0   ? (cells[ci.status]?.trim()||'未着手') : '未着手',
      tags: []
    });
  }
  return result;
}

function splitCSV(line) {
  const result=[]; let cur=''; let inQ=false;
  for(let i=0; i<line.length; i++) {
    const c=line[i];
    if(c==='"'){ inQ=!inQ; }
    else if(c===','&&!inQ){ result.push(cur.trim()); cur=''; }
    else { cur+=c; }
  }
  result.push(cur.trim());
  return result;
}

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closeModal();
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter') saveModal();
  if((e.ctrlKey||e.metaKey)&&e.key==='k') { e.preventDefault(); document.getElementById('quick-input').focus(); }
});

// ── RESIZE ──
let _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(render, 150);
});

// ── INIT ──
load();
render();
</script>
